<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/Favicon.png" type="image/png">
</head>
<body>

    <div class="watermark">by Daus XD</div>

    <header>
        <h1>PlayMusic</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari judul lagu...">
        </div>
        <div class="filter-container">
            <select id="filterSelect">
                <option value="terbaru">Terbaru</option>
                <option value="terlama">Terlama</option>
                <option value="A-Z">A - Z (Custom)</option>
            </select>
            <button id="openUploadBtn" class="glow-btn">+</button>
        </div>
    </header>

    <main id="audioList">
        </main>

    <div id="permissionModal" class="modal">
        <div class="modal-content">
            <h2>Izin Akses Audio</h2>
            <p>Klik tombol di bawah untuk mengaktifkan pemutar suara di browser ini.</p>
            <button id="grantPermissionBtn" class="glow-btn">Aktifkan Suara</button>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Unggah Audio</h2>
            <p>Format: .mp3, .wav, .ogg</p>
            <input type="file" id="audioInput" accept=".mp3, .wav, .ogg" hidden>
            <button onclick="document.getElementById('audioInput').click()" class="glow-btn">Pilih File</button>
            
            <div id="progressContainer" style="display:none;">
                <div class="progress-bar-bg">
                    <div id="progressBar" class="progress-bar-fill"></div>
                </div>
                <p id="progressText">0%</p>
            </div>
        </div>
    </div>

    <div id="playerBar" class="player-bar" style="display: none;">
        <div class="player-info">
            <img src="favicon.png" class="player-thumb" id="playerFavicon">
            <div>
                <h4 id="currentTitle">Judul Lagu</h4>
                <small id="currentTimeDisplay">00:00 / 00:00</small>
            </div>
        </div>
        <div class="player-controls">
            <button id="prevBtn">⏮</button>
            <button id="playPauseBtn">▶</button>
            <button id="nextBtn">⏭</button>
            <button id="stopBtn">✖</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
