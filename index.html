<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="icon" href="/Favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>PlayMusic</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari judul audio...">
            <select id="filterSelect">
                <option value="terbaru">Terbaru</option>
                <option value="terlama">Terlama</option>
                <option value="terakhir">Terakhir Diputar</option>
            </select>
        </div>
        <button id="openUploadBtn" class="glow-btn">Unggah Audio</button>
    </header>

    <main id="audioList">
        </main>

    <div id="permissionModal" class="modal">
        <div class="modal-content">
            <h3>Izin Akses Audio</h3>
            <p>Klik tombol di bawah untuk mengaktifkan pemutar suara di browser ini.</p>
            <button id="grantPermissionBtn" class="glow-btn">Aktifkan Suara</button>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Unggah Audio Baru</h3>
            <p class="format-info">Format: .mp3, .wav, .m4a</p>
            <input type="file" id="audioFileInput" accept=".mp3,.wav,.m4a">
            <div id="progressContainer" style="display:none;">
                <div id="progressBar">0%</div>
            </div>
            <button id="startUploadBtn" class="glow-btn">Simpan ke List</button>
        </div>
    </div>

    <div id="bottomPlayer" class="bottom-player" style="display:none;">
        <div class="player-info">
            <span id="currentTitle">Judul Audio</span>
        </div>
        <div class="player-controls">
            <button id="prevBtn">⏮</button>
            <button id="playPauseBtn">▶</button>
            <button id="nextBtn">⏭</button>
            <button id="stopBtn">✖</button>
        </div>
    </div>

    <div class="watermark">by Daus XD</div>

    <script src="script.js"></script>
</body>
</html>
