<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="icon" href="/Favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="watermark">Daus XD</div>

    <header>
        <h1>PlayMusic</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari judul lagu...">
            <select id="filterSelect">
                <option value="terbaru">Terbaru</option>
                <option value="terlama">Terlama</option>
                <option value="ukuran">Ukuran Terkecil</option>
            </select>
        </div>
        <button id="openUploadBtn" class="btn-glow">Unggah Audio</button>
    </header>

    <main id="audioList">
        </main>

    <div id="permissionModal" class="modal">
        <div class="modal-content">
            <h3>Izin Akses Suara</h3>
            <p>Klik tombol di bawah untuk mengaktifkan fitur pemutar audio di browser ini.</p>
            <button id="grantPermission" class="btn-glow">Aktifkan Suara</button>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>Unggah Audio Baru</h3>
            <p>Format: .mp3, .wav, .ogg</p>
            <input type="file" id="audioFileInput" accept=".mp3,.wav,.ogg">
            <div class="progress-container" id="progressContainer" style="display:none;">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
            <button id="startUploadBtn" class="btn-glow">Mulai Unggah</button>
        </div>
    </div>

    <div id="playerBar" class="player-bar" style="display:none;">
        <div class="player-info">
            <span id="currentTitle">Judul Lagu</span>
            <span id="currentDuration">00:00 / 00:00</span>
        </div>
        <div class="player-controls">
            <button id="prevBtn">⏮</button>
            <button id="playPauseBtn">▶</button>
            <button id="nextBtn">⏭</button>
            <button id="stopBtn">✖</button>
        </div>
        <input type="range" id="audioSeeker" value="0" max="100">
    </div>

    <script src="script.js"></script>
</body>
</html>
