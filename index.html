<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/Favicon.png" type="image/x-icon">
</head>
<body>

    <div class="watermark">by Daus XD</div>

    <header>
        <h1>PlayMusic</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari judul audio...">
            <select id="filterSelect">
                <option value="terbaru">Terbaru</option>
                <option value="terlama">Terlama</option>
            </select>
            <button onclick="openUploadModal()" class="btn-glow">+</button>
        </div>
    </header>

    <main id="audioList">
        </main>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>Unggah Audio</h3>
            <p>Format: MP3, WAV, OGG</p>
            <input type="file" id="audioInput" accept=".mp3, .wav, .ogg">
            <div class="progress-container" id="progressContainer" style="display:none;">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
            <div class="modal-actions">
                <button onclick="handleUpload()" class="btn-pink">Unggah</button>
                <button onclick="closeUploadModal()" class="btn-outline">Batal</button>
            </div>
        </div>
    </div>

    <div id="permissionOverlay" class="overlay">
        <div class="overlay-content">
            <h2>Izin Suara</h2>
            <p>Aktifkan suara untuk memulai pengalaman musik yang elegan.</p>
            <button onclick="enableAudio()" class="btn-glow">Aktifkan Suara</button>
        </div>
    </div>

    <div id="playerBar" class="player-bar" style="display:none;">
        <div class="player-info">
            <marquee id="currentTitle">Judul Lagu</marquee>
        </div>
        <div class="player-controls">
            <button onclick="prevAudio()">⏮</button>
            <button id="playPauseBtn" onclick="togglePlay()">▶</button>
            <button onclick="nextAudio()">⏭</button>
            <button onclick="stopAudio()" class="close-player">✖</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
