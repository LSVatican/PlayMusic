<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="/Favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="permissionOverlay" class="overlay">
        <div class="glass-card glow-pink">
            <h3>Izin Akses Audio</h3>
            <p>Klik tombol di bawah untuk mengaktifkan pemutar audio pada browser ini.</p>
            <button onclick="enableAudio()" class="btn-main">Aktifkan Suara</button>
        </div>
    </div>

    <header>
        <h1>PlayMusic</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari judul audio..." oninput="searchAudio()">
            <i class="fa fa-search"></i>
        </div>
        <div class="filter-box">
            <select id="filterSelect" onchange="loadAudioList()">
                <option value="terbaru">Terbaru</option>
                <option value="terlama">Terlama</option>
                <option value="ukuran">Ukuran Terbesar</option>
            </select>
            <button class="btn-add" onclick="toggleUploadModal(true)"><i class="fa fa-plus"></i> Unggah</button>
        </div>
    </header>

    <main id="audioList">
        </main>

    <div id="uploadModal" class="modal">
        <div class="modal-content glow-pink">
            <h3>Unggah Audio Baru</h3>
            <p>Format: .mp3, .wav, .ogg</p>
            <input type="file" id="audioInput" accept=".mp3,.wav,.ogg" hidden>
            <label for="audioInput" class="upload-area">Pilih File Audio</label>
            
            <div id="progressWrapper" style="display:none;">
                <div class="progress-bar-bg">
                    <div id="progressBar" class="progress-bar-fill"></div>
                </div>
                <p id="progressText">0%</p>
            </div>
            
            <button class="btn-close" onclick="toggleUploadModal(false)">Batal</button>
        </div>
    </div>

    <div id="playerBar" class="player-bar glow-pink-top">
        <div class="player-info">
            <span id="playerTitle">Memutar: -</span>
            <span id="playerTime">00:00 / 00:00</span>
        </div>
        <div class="player-controls">
            <button onclick="playPrev()"><i class="fa fa-step-backward"></i></button>
            <button id="playBtn" onclick="togglePlay()"><i class="fa fa-play"></i></button>
            <button onclick="playNext()"><i class="fa fa-step-forward"></i></button>
            <button onclick="stopAudio()" class="btn-stop"><i class="fa fa-times"></i></button>
        </div>
        <input type="range" id="seekSlider" value="0" step="1" oninput="seekAudio()">
    </div>

    <div class="watermark">by Daus XD</div>

    <script src="script.js"></script>
</body>
</html>
