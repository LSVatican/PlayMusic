<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="icon" href="/Favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>PlayMusic</h1>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Cari judul lagu...">
        </div>
        <div class="filters">
            <select id="filterSelect">
                <option value="terbaru">Terbaru</option>
                <option value="terlama">Terlama</option>
                <option value="nama">Nama (A-Z)</option>
            </select>
            <button id="openUploadBtn" class="btn-glow">Unggah Audio</button>
        </div>
    </header>

    <main id="audioList">
        </main>

    <div id="permissionModal" class="modal">
        <div class="modal-content">
            <h2>Izin Audio</h2>
            <p>Izinkan browser untuk memutar suara secara otomatis?</p>
            <button id="allowAudioBtn" class="btn-glow">Aktifkan Suara</button>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Unggah Lagu</h2>
            <p>Format: .mp3, .wav, .ogg</p>
            <input type="file" id="audioFile" accept=".mp3,.wav,.ogg">
            <div class="progress-container" id="progressContainer" style="display:none;">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
        </div>
    </div>

    <div id="playerBar" class="player-bar" style="display:none;">
        <div class="song-info">
            <marquee id="currentTitle">Judul Lagu</marquee>
        </div>
        <div class="controls">
            <button id="prevBtn">⏮</button>
            <button id="playPauseBtn">▶</button>
            <button id="nextBtn">⏭</button>
            <button id="closePlayer">✖</button>
        </div>
        <input type="range" id="seekSlider" value="0" max="100">
    </div>

    <div class="watermark">by Daus XD</div>

    <script src="script.js"></script>
</body>
</html>
