<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/Favicon.png" type="image/png">
</head>
<body>

    <div class="container">
        <header>
            <h1>PlayMusic</h1>
            <p class="watermark">by Daus XD</p>
        </header>

        <div class="controls-top">
            <input type="text" id="searchInput" placeholder="Cari judul lagu...">
            <select id="filterSelect">
                <option value="terbaru">Terbaru</option>
                <option value="terlama">Terlama</option>
                <option value="judul">A-Z (Judul)</option>
            </select>
            <button id="openUploadBtn" class="glow-btn">+</button>
        </div>

        <div id="audioList" class="audio-list">
            </div>
    </div>

    <div id="permissionModal" class="modal">
        <div class="modal-content">
            <h3>Izin Akses Audio</h3>
            <p>Klik tombol di bawah untuk mengaktifkan pemutar musik di browser ini.</p>
            <button id="grantPermission" class="glow-btn">Aktifkan Suara</button>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeUpload">&times;</span>
            <h3>Unggah Audio</h3>
            <p class="info">Format: MP3, WAV, OGG</p>
            <input type="file" id="fileInput" accept=".mp3, .wav, .ogg">
            
            <div id="progressContainer" style="display:none;">
                <div class="progress-bar-bg">
                    <div id="progressBar" class="progress-bar-fill"></div>
                </div>
                <p id="progressText">0%</p>
            </div>
            
            <button id="uploadBtn" class="glow-btn">Mulai Unggah</button>
        </div>
    </div>

    <div id="playerBar" class="player-bar">
        <div class="track-info">
            <div class="marquee">
                <span id="currentTitle">Pilih Lagu...</span>
            </div>
            <small id="currentTimeDisplay">00:00 / 00:00</small>
        </div>
        
        <div class="player-controls">
    <button id="prevBtn">Prev</button>
    <button id="playPauseBtn"><span id="playIcon">Play</span></button> 
    <button id="nextBtn">Next</button>
    <button id="stopBtn" class="stop-btn">Close</button>
</div>
        <div class="seek-container">
            <input type="range" id="seekSlider" value="0" max="100">
        </div>
    </div>

    <audio id="mainAudio"></audio>
    <script src="script.js"></script>
</body>
</html>
