<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/Favicon.png" type="image/png">
</head>
<body>

    <div class="watermark">Daus XD</div>

    <div id="permission-overlay" class="overlay">
        <div class="popup glowing-pink">
            <h3>Izin Suara Browser</h3>
            <p>Klik tombol di bawah untuk mengaktifkan fitur pemutar audio otomatis.</p>
            <button onclick="enableAudio()" class="btn-main">Aktifkan Suara</button>
        </div>
    </div>

    <header>
        <h1>PlayMusic</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Cari judul lagu..." onkeyup="searchAudio()">
            <select id="filter-select" onchange="filterAudio()">
                <option value="terbaru">Terbaru</option>
                <option value="terlama">Terlama</option>
                <option value="ukuran">Ukuran Terbesar</option>
            </select>
        </div>
        <button class="btn-main" onclick="openUploadModal()">+ Unggah Audio</button>
    </header>

    <main id="audio-list">
        </main>

    <div id="upload-modal" class="overlay">
        <div class="popup glowing-pink">
            <h3>Unggah Audio</h3>
            <p>Format: .mp3, .wav, .ogg</p>
            <input type="file" id="file-input" accept=".mp3,.wav,.ogg">
            <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="modal-actions">
                <button onclick="processUpload()" class="btn-main">Unggah</button>
                <button onclick="closeUploadModal()" class="btn-secondary">Batal</button>
            </div>
        </div>
    </div>

    <div id="player-bar" class="player-bar hidden">
        <div class="player-info">
            <span id="current-title">Judul Lagu</span>
        </div>
        <div class="player-controls">
            <button onclick="prevAudio()">⏮</button>
            <button id="play-pause-btn" onclick="togglePlay()">▶</button>
            <button onclick="nextAudio()">⏭</button>
            <button onclick="stopAudio()" class="btn-close">✖</button>
        </div>
        <audio id="main-audio"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
