<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="icon" href="/Favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>PlayMusic</h1>
        <div class="watermark">Daus XD</div>
    </header>

    <div class="controls-container">
        <input type="text" id="searchBar" placeholder="Cari judul audio...">
        <select id="filterSelect">
            <option value="terbaru">Terbaru</option>
            <option value="terlama">Terlama</option>
        </select>
        <button id="openUploadBtn">Unggah Audio</button>
    </div>

    <main id="audioList">
        </main>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>Unggah Audio</h3>
            <p>Format: .mp3, .wav, .m4a</p>
            <input type="file" id="audioInput" accept=".mp3,.wav,.m4a">
            <div class="progress-container" id="progressContainer" style="display:none;">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
            <button class="close-modal" id="closeUploadBtn">Batal</button>
        </div>
    </div>

    <div id="playerBar" class="player-bar" style="display:none;">
        <div class="track-info">
            <div class="scrolling-text">
                <span id="playerTitle">Judul Lagu Sedang Diputar</span>
            </div>
            <small id="playerTime">00:00 / 00:00</small>
        </div>
        <div class="player-controls">
            <button id="prevBtn">⏮</button>
            <button id="playPauseBtn">▶</button>
            <button id="nextBtn">⏭</button>
            <button id="stopBtn">✖</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
