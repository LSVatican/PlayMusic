<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="icon" href="/Favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 class="glow-text">PlayMusic</h1>
        <p class="watermark">by Daus XD</p>
    </header>

    <div class="controls-container">
        <input type="text" id="searchInput" placeholder="Cari judul lagu...">
        <select id="filterSelect">
            <option value="terbaru">Terbaru</option>
            <option value="terlama">Terlama</option>
            <option value="terakhir">Terakhir Diputar</option>
        </select>
    </div>

    <main id="audioList" class="audio-grid"></main>

    <button id="openUploadBtn" class="fab">+</button>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>Unggah Audio</h3>
            <p class="info-text">Format: .mp3, .wav, .ogg</p>
            <input type="file" id="fileInput" accept=".mp3, .wav, .ogg">
            <div id="progressContainer" style="display:none;">
                <div id="progressBar">0%</div>
            </div>
        </div>
    </div>

    <div id="permissionOverlay" class="overlay">
        <div class="permission-box">
            <h3>Izin Audio</h3>
            <p>Klik tombol di bawah untuk mengaktifkan suara di browser ini.</p>
            <button id="enableAudioBtn">Aktifkan Suara</button>
        </div>
    </div>

    <div id="playerBar" class="player-bar hidden">
        <div class="player-info">
            <marquee id="currentTitle">Judul Lagu</marquee>
            <span id="currentTime">00:00 / 00:00</span>
        </div>
        <div class="player-controls">
            <button id="prevBtn">⏮</button>
            <button id="playPauseBtn">▶</button>
            <button id="nextBtn">⏭</button>
            <button id="closePlayerBtn">✖</button>
        </div>
        <div class="seek-bar-container">
            <input type="range" id="seekBar" value="0" max="100">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
