<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>

    <div class="container">
        <header>
            <h1>PlayMusic</h1>
            <p class="watermark">by Daus XD</p>
        </header>

        <div class="controls-top">
            <input type="text" id="searchInput" placeholder="Cari judul lagu...">
            <select id="filterSelect">
                <option value="terbaru">Terbaru</option>
                <option value="terlama">Terlama</option>
                <option value="az">A - Z (Custom)</option>
            </select>
        </div>

        <div id="audioList" class="audio-list">
            </div>

        <button class="btn-upload-trigger" onclick="togglePopup(true)">+ Unggah Audio</button>
    </div>

    <div id="uploadPopup" class="popup">
        <div class="popup-content">
            <h3>Unggah Audio</h3>
            <p>Format: .mp3, .wav, .ogg</p>
            <input type="file" id="fileInput" accept=".mp3,.wav,.ogg">
            
            <div id="progressContainer" style="display:none;">
                <div class="progress-bar">
                    <div id="progressBarFill"></div>
                </div>
                <span id="progressPercent">0%</span>
            </div>
            
            <div class="popup-btns">
                <button onclick="uploadAudio()">Unggah</button>
                <button onclick="togglePopup(false)">Batal</button>
            </div>
        </div>
    </div>

    <div id="playerBar" class="player-bar">
        <div class="progress-container">
            <input type="range" id="seekSlider" value="0" step="0.1">
        </div>
        <div class="player-info">
            <div class="title-wrap">
                <div id="playerTitle" class="marquee">Memutar lagu...</div>
            </div>
            <div class="player-time">
                <span id="currentTime">0:00</span> / <span id="durationTime">0:00</span>
            </div>
        </div>
        <div class="player-controls">
            <button onclick="prevTrack()">⏮</button>
            <button id="playPauseBtn" onclick="togglePlay()">▶</button>
            <button onclick="nextTrack()">⏭</button>
            <button onclick="stopAudio()" class="btn-close-player">✖</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
