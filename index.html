<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="permissionOverlay" class="overlay">
        <div class="glass-card glow-pink">
            <i class="fa fa-headphones-alt fa-3x" style="color:var(--pink-main)"></i>
            <h3>Izin Akses Audio</h3>
            <p>Klik tombol di bawah untuk mengaktifkan pemutar audio "PlayMusic".</p>
            <button onclick="enableAudio()" class="btn-main">AKTIFKAN SEKARANG</button>
        </div>
    </div>

    <header>
        <h1 class="logo-text">PlayMusic</h1>
        
        <div class="search-container">
            <i class="fa fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Cari musik favoritmu..." oninput="searchAudio()">
            <i class="fa fa-times clear-icon" id="clearSearch" onclick="clearSearch()" style="display:none;"></i>
        </div>

        <div class="filter-wrapper">
            <button class="filter-chip active" onclick="applyFilter(this, 'terbaru')">Terbaru</button>
            <button class="filter-chip" onclick="applyFilter(this, 'a-z')">A-Z</button>
            <button class="filter-chip" onclick="applyFilter(this, 'terlama')">Terlama</button>
            <button class="filter-chip" onclick="applyFilter(this, 'ukuran')">Ukuran</button>
        </div>
    </header>

    <main id="audioList" class="audio-container">
        </main>

    <button class="btn-add-floating" onclick="toggleUploadModal(true)">
        <i class="fa fa-plus"></i>
    </button>

    <div id="uploadModal" class="modal">
        <div class="modal-content glow-pink">
            <h3>Unggah Audio</h3>
            <p style="font-size: 12px; opacity: 0.7;">Format: MP3, WAV, OGG</p>
            
            <input type="file" id="audioInput" accept=".mp3,.wav,.ogg" hidden>
            <label for="audioInput" class="upload-area">
                <i class="fa fa-cloud-upload-alt fa-2x"></i><br>Pilih File
            </label>
            
            <div id="progressWrapper" style="display:none;">
                <div class="progress-bar-bg">
                    <div id="progressBar" class="progress-bar-fill"></div>
                </div>
                <p id="progressText">0%</p>
            </div>
            
            <button class="btn-close" onclick="toggleUploadModal(false)">Batal</button>
        </div>
    </div>

    <div id="playerBar" class="player-bar glow-pink-top">
        <input type="range" id="seekSlider" value="0" step="1" oninput="seekAudio()" class="main-slider">
        
        <div class="player-inner">
            <div class="song-info">
                <img src="/Favicon.png" class="mini-icon">
                <div>
                    <div id="playerTitle" class="truncate">Memilih musik...</div>
                    <small id="playerTime">00:00 / 00:00</small>
                </div>
            </div>

            <div class="player-controls">
                <button onclick="playPrev()"><i class="fa fa-step-backward"></i></button>
                <button id="playBtn" onclick="togglePlay()" class="btn-play-main"><i class="fa fa-play"></i></button>
                <button onclick="playNext()"><i class="fa fa-step-forward"></i></button>
                <button onclick="stopAudio()" class="btn-stop"><i class="fa fa-times"></i></button>
            </div>
        </div>
    </div>

    <div class="watermark">by Daus XD</div>

    <script src="script.js"></script>
</body>
</html>
