<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="icon" href="/Favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>PlayMusic</h1>
            <p class="watermark">by Daus XD</p>
        </header>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Cari judul audio...">
            <select id="filterSelect">
                <option value="terbaru">Terbaru</option>
                <option value="terlama">Terlama</option>
                <option value="az">A-Z</option>
            </select>
            <button id="openUploadBtn">Unggah Audio</button>
        </div>

        <div id="audioList" class="audio-list"></div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>Unggah Audio Baru</h3>
            <p>Format: .mp3, .wav, .ogg</p>
            <input type="file" id="audioFile" accept=".mp3,.wav,.ogg">
            <div id="progressContainer" style="display:none;">
                <div id="progressBar"></div>
                <span id="progressPercent">0%</span>
            </div>
            <button id="startUpload">Mulai Unggah</button>
            <button id="closeModal">Batal</button>
        </div>
    </div>

    <div id="playerBar" class="player-bar" style="display:none;">
        <div class="track-info">
            <marquee id="playerTitle" behavior="scroll" direction="left">Judul Lagu...</marquee>
        </div>
        <div class="player-controls">
            <button id="prevBtn">⏮</button>
            <button id="playPauseBtn">▶</button>
            <button id="nextBtn">⏭</button>
            <button id="stopBtn">✖</button>
        </div>
        <div class="time-info">
            <span id="currentTime">0:00</span> / <span id="totalDuration">0:00</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
