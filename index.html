<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic - Daus XD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/Favicon.png" type="image/png">
</head>
<body>

    <div class="watermark">Daus XD</div>

    <header>
        <h1>PlayMusic</h1>
        <div class="search-filter-container">
            <input type="text" id="searchInput" placeholder="Cari judul audio...">
            <select id="filterSelect">
                <option value="terbaru">Terbaru</option>
                <option value="terlama">Terlama</option>
                <option value="terakhir">Terakhir Diputar</option>
            </select>
        </div>
        <button id="openUploadBtn" class="glow-btn">Unggah Audio</button>
    </header>

    <main id="audioList">
        </main>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>Unggah Audio Baru</h3>
            <p>Format: .mp3, .wav, .ogg</p>
            <input type="file" id="audioInput" accept=".mp3,.wav,.ogg">
            <div class="progress-container" id="progressContainer" style="display:none;">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
            <button id="closeModalBtn">Batal</button>
        </div>
    </div>

    <div id="playerBar" class="player-bar" style="display:none;">
        <div class="track-info">
            <div class="marquee-container">
                <span id="playerTitle" class="marquee-text">Judul Lagu Sedang Diputar...</span>
            </div>
            <small id="playerDuration">00:00 / 00:00</small>
        </div>
        <div class="player-controls">
            <button id="prevBtn">⏮</button>
            <button id="playPauseBtn">▶</button>
            <button id="nextBtn">⏭</button>
            <button id="stopBtn">✖</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
